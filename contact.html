<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Us | BuildPro Construction</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .page-header {
            background: linear-gradient(rgba(0, 22, 89, 0.8), rgba(0, 22, 89, 0.8)), url('assets/images/materials4.webp') center/cover;
            padding: 120px 0 80px; color: #fff; text-align: center;
        }
        .contact-icon-box { width: 70px; height: 70px; background: #fff3eb; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; transition: 0.3s; }
        .contact-info-item:hover .contact-icon-box { background: var(--primary); color: #fff; }
    </style>
</head>
<body>
     <div id="preloader">
        <div class="loader-content text-center">
            <div class="loader-icon mb-3"><i class="fas fa-hammer"></i></div>
            <h5 class="fw-bold text-secondary tracking-widest">STACKLY</h5>
            <div class="loader-bar mx-auto mt-3"><div class="loader-progress"></div></div>
        </div>
    </div>
    <div id="header-placeholder"></div>

    <section class="page-header overflow-hidden">
        <div class="container" data-aos="fade-down">
            <h1 class="display-4 fw-bold">Get In Touch</h1>
            <p>Ready to build? We are here to help you every step of the way.</p>
        </div>
    </section>

    <section class="py-5 overflow-hidden">
        <div class="container py-5">
            <div class="row g-5">
                <div class="col-lg-4" data-aos="fade-right">
                    <div class="contact-info-item d-flex align-items-center gap-4 mb-5">
                        <div class="contact-icon-box shadow-sm"><i class="bi bi-geo-alt"></i></div>
                        <div>
                            <h5 class="fw-bold text-secondary mb-1">Our Office</h5>
                            <p class="text-muted mb-0">123 Construction Plaza, Chennai, TN</p>
                        </div>
                    </div>
                    <div class="contact-info-item d-flex align-items-center gap-4 mb-5">
                        <div class="contact-icon-box shadow-sm"><i class="bi bi-telephone"></i></div>
                        <div>
                            <h5 class="fw-bold text-secondary mb-1">Call Us</h5>
                            <p class="text-muted mb-0">+91 98765 43210</p>
                        </div>
                    </div>
                    <div class="contact-info-item d-flex align-items-center gap-4 mb-5">
                        <div class="contact-icon-box shadow-sm"><i class="bi bi-envelope"></i></div>
                        <div>
                            <h5 class="fw-bold text-secondary mb-1">Email Us</h5>
                            <p class="text-muted mb-0">info@stacklybuild.com</p>
                        </div>
                    </div>
                    <div class="mt-4">
                        <h5 class="fw-bold text-secondary mb-3">Follow Our Progress</h5>
                        <div class="d-flex gap-3">
                            <a href="#" class="btn btn-primary rounded-circle"><i class="bi bi-facebook"></i></a>
                            <a href="#" class="btn btn-primary rounded-circle"><i class="bi bi-linkedin"></i></a>
                            <a href="#" class="btn btn-primary rounded-circle"><i class="bi bi-twitter-x"></i></a>
                        </div>
                    </div>
                </div>
                <div class="col-lg-8" data-aos="fade-left">
                    <div class="bg-white p-5 rounded-4 shadow-sm">
                        <h3 class="fw-bold text-secondary mb-4">Send Us a Message</h3>
                        <form action="404.html">
                            <div class="row g-3">
                                <div class="col-md-6"><input type="text" class="form-control py-3" placeholder="Your Name" required></div>
                                <div class="col-md-6"><input type="email" class="form-control py-3" placeholder="Your Email" required></div>
                                <div class="col-12"><input type="text" class="form-control py-3" placeholder="Project Subject"></div>
                                <div class="col-12"><textarea class="form-control py-3" rows="5" placeholder="Project Description & Details"></textarea></div>
                                <div class="col-12"><button class="thm-btn w-100 py-3 border-0">Send Message Now</button></div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="pb-5 overflow-hidden" data-aos="zoom-in">
        <div class="container pb-5">
            <div class="rounded-4 overflow-hidden shadow">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d124355.60211603511!2d80.14113944322442!3d13.060233045237803!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a5265ea4f7d333d%3A0x6d66943834612e28!2sChennai%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1716300000000!5m2!1sen!2sin" 
                    width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
