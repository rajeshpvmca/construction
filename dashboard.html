<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body class="bg-light overflow-x-hidden" style="min-height: 100vh;">

    <!-- Modern Preloader -->
    <div id="preloader">
        <div class="loader-content text-center">
            <div class="loader-icon mb-3"><i class="fas fa-hammer"></i></div>
            <h5 class="fw-bold text-secondary tracking-widest">STACKLY</h5>
            <div class="loader-bar mx-auto mt-3"><div class="loader-progress"></div></div>
        </div>
    </div>

    <nav class="navbar navbar-dark bg-dark shadow-sm py-2 sticky-top">
        <div class="container-fluid px-2">
            <div class="d-flex align-items-center">
                <button class="btn btn-lg d-lg-none" id="sidebarToggle" style="color: #ff5e14;">
                    <i class="fa fa-bars"></i>
                </button>
                <div class="navbar-brand primary" >
                    <img src="assets/images/logoStackly.webp" alt="Logo" height="50" class="">
                    <!-- STACKLY <span class="text-white">DASHBOARD</span> -->
                </div>
            </div>
            <div class="d-flex align-items-center">
                <div class="text-white me-3 d-none d-md-block">
                    <span class="small opacity-75">Logged in as:</span>
                    <span id="userName" class="fw-bold primary text-uppercase ms-1"></span>
                </div>
                <button class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold" onclick="logout()">
                    <i class="fa fa-sign-out me-md-1"></i> <span class="d-none d-md-inline">Sign Out</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar shadow-sm py-4">
            <div class="px-3 mb-4 text-center">
                <div class="badge bg-primary text-dark fw-bold text-uppercase px-3 py-2 rounded-pill shadow-sm" id="userRoleBadge">Member</div>
            </div>
            <a href="javascript:void(0)" class="sidebar-link active" data-section="overview"><i class="fa fa-th-large me-2"></i> Overview</a>
            <a href="javascript:void(0)" class="sidebar-link" data-section="schedule"><i class="fa fa-calendar me-2"></i> Schedule</a>
            <a href="javascript:void(0)" class="sidebar-link" data-section="profile"><i class="fa fa-user me-2"></i> Profile</a>
            <a href="javascript:void(0)" class="sidebar-link" data-section="payments"><i class="fa fa-credit-card me-2"></i> Payments</a>
            <a href="javascript:void(0)" class="sidebar-link" data-section="settings"><i class="fa fa-cog me-2"></i> Settings</a>
        </div>

        <!-- Mobile Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Content -->
        <div class="content p-4 p-md-5" id="mainDashboardContent">
            <div class="mb-5" data-aos="fade-down">
                <h2 class="fw-bold mb-0" id="welcomeUser">Welcome</h2>
                <p class="text-muted" id="sectionDescription">Here's what's happening in your fitness zone today.</p>
                <div class="divider-wave primary"></div>
            </div>
            
            <!-- Role specific content will be injected here by dashboard.js -->
            <div id="roleContent" class="row g-4"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
