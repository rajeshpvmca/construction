<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        .auth-image-side {
            position: relative;
            overflow: hidden;
        }
        #tsparticles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1; /* Particles on top of image */
        }
        .auth-image-side > .text-center {
            position: relative;
            z-index: 2; /* Text on top of particles */
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1) !important;
        }
        .auth-form-side {
            background-color: #f4f7ff;
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <!-- Image Side (Visible on Large Screens) -->
        <div class="auth-image-side" data-aos="fade-right">
            <div id="tsparticles"></div>
            <div class="text-center text-white p-5">
                <a href="index.html" class="mb-4 d-inline-block">
                    <img src="assets/images/logoStackly.webp" alt="Logo" style="height: 60px;">
                </a>
                <h2 class="display-5 fw-bold text-primary-glow">Welcome Back!</h2>
                <p class="lead">Build your dream project with the world's most trusted construction management team.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-form-side py-4 py-lg-0 px-3 px-lg-5" data-aos="fade-left">
            <div class="auth-card w-100 bg-white p-4 p-lg-5 rounded-5" style="max-width: 500px;">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-primary small text-decoration-none fw-bold"><i class="fas fa-arrow-left me-2"></i> Back to Home</a>
                </div>
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-secondary">Login</h2>
                    <p class="text-muted">Enter your credentials to access your dashboard</p>
                </div>

                <form id="loginForm">
                    <label class="form-label fw-bold text-secondary">Select Role</label>
                    <select class="form-select mb-3" id="loginRole" required>
                        <option value="">Choose your role...</option>
                        <option>Admin</option>
                        <option>Engineer</option>
                        <option>Contractor</option>
                    </select>

                    <label class="form-label fw-bold text-secondary">Email Address</label>
                    <input class="form-control mb-3" type="email" id="loginEmail" placeholder="name@company.com" required>

                    <label class="form-label fw-bold text-secondary">Password</label>
                    <div class="input-group mb-3">
                        <input class="form-control" type="password" id="loginPassword" placeholder="Enter password" required>
                        <button class="btn btn-outline-secondary toggle-password" type="button">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label small" for="remember">Remember Me</label>
                        </div>
                        <a href="404.html" class="text-primary small text-decoration-none">Forgot Password?</a>
                    </div>

                    <button class="thm-btn w-100 mb-3">Login to Account</button>
                    
                    <p class="text-center mb-0 small">Don't have an account? <a href="signup.html" class="text-primary fw-bold text-decoration-none">Register Now</a></p>
                </form>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script>
        tsParticles.load("tsparticles", {
            particles: {
                number: { value: 60, density: { enable: true, value_area: 800 } },
                color: { value: "#ff5e14" },
                shape: { type: "circle" },
                opacity: {
                    value: 0.5,
                    random: true,
                    anim: { enable: true, speed: 1, opacity_min: 0.1, sync: false }
                },
                size: {
                    value: 3,
                    random: true,
                    anim: { enable: false, speed: 40, size_min: 0.1, sync: false }
                },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: "#ff5e14",
                    opacity: 0.3,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 1.5,
                    direction: "none",
                    random: false,
                    straight: false,
                    out_mode: "out",
                    bounce: false,
                }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: true, mode: "grab" },
                    onclick: { enable: true, mode: "push" },
                    resize: true
                }
            },
            retina_detect: true
        });

        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({
                duration: 1000,
                once: true
            });
        });
    </script>

</body>

</html>
