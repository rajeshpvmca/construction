<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="card shadow mx-auto p-4" style="max-width:500px">

            <h2 class="text-center mb-4">
                Login
            </h2>

            <form id="loginForm">

                <select class="form-select mb-3" id="loginRole" required>
                    <option value="">Select Role</option>
                    <option>Admin</option>
                    <option>Engineer</option>
                    <option>Contractor</option>
                </select>

                <input class="form-control mb-3" type="email" id="loginEmail" placeholder="Email">

                <input class="form-control mb-3" type="password" id="loginPassword" placeholder="Password">

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label">
                        Remember Me
                    </label>
                </div>

                <button class="btn w-100 text-white" style="background-color: #ff5e14; border-color: #ff5e14;">
                    Login
                </button>

            </form>

        </div>
    </div>

    <script src="js/auth.js"></script>

</body>

</html>
