<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Page Not Found | Construction Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
</head>

<body>

  

    <section class="error-page d-flex align-items-center min-vh-100 py-5 overflow-hidden">
        <div class="container text-center pt-5">
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">
                    <div class="animate__animated animate__zoomIn">
                        <i class="bi bi-cone-striped display-1 text-primary"></i>
                    </div>
                    
                    <h1 class="display-1 fw-bold text-secondary animate__animated animate__fadeInUp">
                        404
                    </h1>
            
                    <h3 class="display-5 fw-bold text-secondary animate__animated animate__fadeInUp animate__delay-1s">
                        Oops! Page Not Found
                    </h3>
                    
                    <p class="text-muted fs-5 mb-5 animate__animated animate__fadeInUp animate__delay-2s">
                        We're sorry, the page you requested could not be found. 
                        It seems you've wandered into an unfinished construction zone!
                    </p>
            
                    <div class="d-flex flex-wrap justify-content-center gap-3 animate__animated animate__fadeInUp animate__delay-3s">
                        <a href="index.html" class="thm-btn">
                            <i class="fas fa-home me-2"></i> Back to Home
                        </a>
                        <button onclick="history.back()" class="btn btn-outline-dark rounded-pill px-5 py-3 fw-bold">
                            <i class="fas fa-arrow-left me-2"></i> Go Back
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

   

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
