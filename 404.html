<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Page Not Found | Construction Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .error-page {
            background: radial-gradient(circle at center, #001f7d 0%, #000b2e 100%);
            position: relative;
            overflow: hidden;
        }

        #tsparticles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .error-content {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 60px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .glitch-text {
            font-size: 150px;
            line-height: 1;
            background: linear-gradient(45deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(255, 94, 20, 0.3);
            margin-bottom: 0;
        }

        .floating-icon {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
            color: var(--primary);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .thm-btn {
            border: none;
        }
    </style>
</head>

<body class="bg-dark">
    <div id="tsparticles"></div>

    <section class="error-page d-flex align-items-center min-vh-100 py-5 overflow-hidden">
        <div class="container text-center">
            <div class="row justify-content-center">
                <div class="col-lg-7 col-md-10 error-content animate__animated animate__zoomIn">
                    <div class="mb-4">
                        <i class="bi bi-cone-striped floating-icon"></i>
                    </div>
                    
                    <h1 class="fw-extrabold glitch-text animate__animated animate__pulse animate__infinite">
                        404
                    </h1>
            
                    <h3 class="display-6 fw-bold text-white mb-3">
                        Site Under Construction?
                    </h3>
                    
                    <p class="text-white-50 fs-5 mb-5">
                        The blueprint you're looking for doesn't exist. 
                        This area is still off-limits!
                    </p>
            
                    <div class="d-flex flex-wrap justify-content-center gap-3">
                        <a href="index.html" class="thm-btn">
                            <i class="fas fa-home me-2"></i> Back to Home
                        </a>
                        <button onclick="history.back()" class="btn btn-outline-light rounded-pill px-5 py-3 fw-bold">
                            <i class="fas fa-arrow-left me-2"></i> Go Back
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

   

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script>
        tsParticles.load("tsparticles", {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: "#ff5e14" },
                shape: { type: "circle" },
                opacity: {
                    value: 0.5,
                    random: true,
                    anim: { enable: true, speed: 1, opacity_min: 0.1, sync: false }
                },
                size: {
                    value: 3,
                    random: true,
                    anim: { enable: false, speed: 40, size_min: 0.1, sync: false }
                },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: "#ff5e14",
                    opacity: 0.2,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 2,
                    direction: "none",
                    random: false,
                    straight: false,
                    out_mode: "out",
                    bounce: false,
                }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: true, mode: "grab" },
                    onclick: { enable: true, mode: "push" },
                    resize: true
                }
            },
            retina_detect: true
        });
    </script>
</body>
</html>
