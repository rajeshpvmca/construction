<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>

    <div class="auth-wrapper">
        <!-- Form Side -->
        <div class="auth-form-side px-3 py-2 py-lg-5 px-lg-5" data-aos="fade-up">
            <div class="auth-card w-100 bg-white p-xl-5 p-3 rounded-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-secondary">Register</h2>
                    <p class="text-muted">Create your account to get started</p>
                </div>

                <form id="signupForm">
                    <label class="form-label fw-bold text-secondary">Full Name</label>
                    <input class="form-control mb-3" type="text" id="name" placeholder="John Doe" required>

                    <label class="form-label fw-bold text-secondary">Select Role</label>
                    <select class="form-select mb-3" id="role" required>
                        <option value="">Choose your role...</option>
                        <option>Admin</option>
                        <option>Engineer</option>
                        <option>Contractor</option>
                    </select>

                    <label class="form-label fw-bold text-secondary">Email Address</label>
                    <input class="form-control mb-3" type="email" id="email" placeholder="name@company.com" required>

                    <label class="form-label fw-bold text-secondary">Password</label>
                    <div class="input-group mb-3">
                        <input class="form-control" type="password" id="password" placeholder="Enter password" required>
                        <button class="btn btn-outline-secondary toggle-password" type="button">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <label class="form-label fw-bold text-secondary">Confirm Password</label>
                    <div class="input-group mb-3">
                        <input class="form-control" type="password" id="confirmPassword" placeholder="Confirm password" required>
                        <button class="btn btn-outline-secondary toggle-password" type="button">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label small" for="terms">
                            I accept the <a href="404.html" class="text-primary fw-bold text-decoration-none">Terms & Conditions</a>
                        </label>
                    </div>

                    <button class="thm-btn w-100 mb-3">Register Account</button>
                    
                    <p class="text-center mb-0 small">Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Login Here</a></p>
                </form>
            </div>
        </div>

        <!-- Image Side (Visible on Large Screens) -->
        <div class="auth-image-side" data-aos="zoom-in">
            <div class="text-center text-white p-5">
                <a href="index.html" class="mb-4 d-inline-block">
                    <img src="assets/images/logoStackly.webp" alt="Logo" style="height: 60px;">
                </a>
                <h2 class="display-5 fw-bold text-primary-glow">Join Our Team!</h2>
                <p class="lead">Register now to start building your future with Stackly Construction.</p>
            </div>
        </div>

    </div>

    <script src="js/auth.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({
                duration: 1000,
                once: true
            });
        });
    </script>

</body>

</html>
